# ─────────────────────────────────────────────
# Build settings
# ─────────────────────────────────────────────
[build]
  publish = "dist"
  command = "npm run build"

# ─────────────────────────────────────────────
# SPA redirect — all routes go to index.html
# so React Router handles navigation client-side
# ─────────────────────────────────────────────
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ─────────────────────────────────────────────
# Cache strategy
#
# index.html → NEVER cached
#   The entry point must always be fresh so the browser
#   fetches the latest hashed JS/CSS filenames after a deploy.
#   Without this, users may load stale HTML pointing to
#   asset files that no longer exist on the CDN.
#
# /assets/*  → cached FOREVER (immutable)
#   Vite injects a content hash in every asset filename
#   (e.g. index-XteJV5XO.js). A new deploy produces new
#   hashes → new URLs → no stale cache issues.
# ─────────────────────────────────────────────
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma        = "no-cache"
    Expires       = "0"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Static files in /public (logo, icons, etc.) — short cache
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"
